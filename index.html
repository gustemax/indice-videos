<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice de Vídeos IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8ff5a;
    --accent2: #ff6b35;

    --cat-agentes: #a78bfa;
    --cat-agentes-bg: rgba(167,139,250,0.12);
    --cat-ccprod: #34d399;
    --cat-ccprod-bg: rgba(52,211,153,0.12);
    --cat-video: #fb923c;
    --cat-video-bg: rgba(251,146,60,0.12);
    --cat-monet: #86efac;
    --cat-monet-bg: rgba(134,239,172,0.12);
    --cat-tools: #60a5fa;
    --cat-tools-bg: rgba(96,165,250,0.12);
    --cat-whats: #f472b6;
    --cat-whats-bg: rgba(244,114,182,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 3rem 2.5rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(232,255,90,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }
  .header-meta {
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex; gap: 1.5rem; flex-wrap: wrap;
  }
  .header-meta b { color: var(--text); }

  /* LAYOUT */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 2.5rem;
  }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; font-weight: 500; }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px 12px 40px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-controls {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 250px 220px;
    gap: 12px;
    margin-bottom: 2rem;
    align-items: start;
  }
  .sort-wrap {
    display: grid;
    gap: 6px;
  }
  .sort-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sort-wrap select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sort-wrap select:focus { border-color: var(--accent); }
  .status-wrap {
    display: grid;
    gap: 6px;
  }
  .status-wrap select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .status-wrap select:focus { border-color: var(--accent); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--surface2); }
  .card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--border2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover::after { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .cat-badge {
    padding: 3px 9px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .play-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 10px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .card:hover .play-icon {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,90,0.08);
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }
  .card-author {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .card-meta-row {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .card-date {
    white-space: nowrap;
    text-align: right;
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    background: var(--surface2);
  }
  .card-thumb-wrap {
    position: relative;
    width: 100%;
  }
  .card-thumb-wrap .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.45);
    border-radius: 2px;
  }
  .card-thumb-wrap .play-overlay span {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(232,255,90,0.92);
    display: flex; align-items: center; justify-content: center;
    color: #0d0d0d;
    font-size: 14px;
    padding-left: 3px;
  }
  .card:hover .play-overlay { opacity: 1; }
  .card-watched-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 2;
    padding: 4px 8px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(232,255,90,0.92);
    color: #0d0d0d;
    font-weight: 600;
  }

  .card-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 0 0;
    border-top: 1px solid var(--border);
    transition: color 0.15s;
  }
  .card-link:hover { color: var(--accent); }
  .card-actions {
    display: flex;
    justify-content: flex-end;
    padding-top: 0.25rem;
  }
  .watch-toggle-btn {
    padding: 6px 10px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .watch-toggle-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }
  .watch-toggle-btn.watched {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,90,0.08);
  }

  /* MODAL PLAYER */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    width: min(860px, 95vw);
    max-height: 90vh;
    overflow-x: hidden;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  .modal-header .title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .modal-header .author { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .close-btn {
    background: none; border: 1px solid var(--border2);
    color: var(--muted); font-size: 16px;
    width: 32px; height: 32px;
    border-radius: 2px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .close-btn:hover { border-color: var(--text); color: var(--text); }
  .modal-body {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    flex-shrink: 0;
  }
  .modal-body iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .modal-footer {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex; gap: 1rem; align-items: center; justify-content: space-between; flex-wrap: wrap;
  }
  .modal-footer a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .modal-footer a:hover { color: var(--accent); }
  .modal-footer-actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .modal-info {
    padding: 1.25rem;
    border-top: 1px solid var(--border);
    display: grid;
    gap: 1rem;
  }
  .modal-info-block {
    display: grid;
    gap: 0.5rem;
  }
  .modal-info-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-info-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }
  .modal-info-text.clamped {
    max-height: 8.2rem;
    overflow: hidden;
    position: relative;
  }
  .modal-info-text.clamped::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2.5rem;
    background: linear-gradient(to bottom, rgba(22,22,22,0), rgba(22,22,22,1));
    pointer-events: none;
  }
  .modal-info-empty {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .modal-expand-btn {
    width: fit-content;
    padding: 6px 10px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-expand-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .modal-expand-btn.hidden {
    display: none;
  }
  .modal-links {
    display: grid;
    gap: 0.65rem;
  }
  .modal-link-item {
    display: grid;
    gap: 0.3rem;
    padding: 0.75rem 0.85rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
  }
  .modal-link-index {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-link-item a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    text-decoration: none;
    word-break: break-all;
    transition: color 0.15s;
  }
  .modal-link-item a:hover { color: var(--accent); }

  /* CANAIS */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 3rem;
  }
  .channel-card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: background 0.15s;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .channel-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .channel-card:hover { background: var(--surface2); }
  .channel-card:hover::after { opacity: 1; }
  .channel-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    margin-bottom: 0.25rem;
    flex-shrink: 0;
  }
  .channel-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .channel-handle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .channel-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 0.25rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .channel-link-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    transition: color 0.15s;
  }
  .channel-card:hover .channel-link-label { color: var(--accent); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    padding: 3rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* COUNTER */
  .count-bar {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .count-bar b { color: var(--accent); }
  .active-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .active-filter-chip {
    padding: 6px 10px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--surface);
  }
  .clear-filters-btn {
    padding: 6px 10px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-filters-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .section-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .section-meta b { color: var(--accent); }

  @media (max-width: 760px) {
    .search-controls {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Índice de conteúdo</div>
  <h1>Vídeos <span>IA</span></h1>
  <div class="header-meta">
    <span><b id="total-count">14</b> vídeos</span>
    <span><b>6</b> categorias</span>
    <span><b>Abr 2026</b></span>
  </div>
</header>

<div class="container">
  <div class="search-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Buscar por título, canal ou categoria...">
    </div>
    <div class="sort-wrap">
      <label class="sort-label" for="sort-select">Ordenar por</label>
      <select id="sort-select">
        <option value="published_desc">Publicação: mais novos</option>
        <option value="published_asc">Publicação: mais antigos</option>
        <option value="added_desc">Inclusão na lista: mais recentes</option>
        <option value="added_asc">Inclusão na lista: mais antigos</option>
      </select>
    </div>
    <div class="status-wrap">
      <label class="sort-label" for="watch-status-select">Status</label>
      <select id="watch-status-select">
        <option value="all">Todos</option>
        <option value="watched">Assistidos</option>
        <option value="unwatched">Não assistidos</option>
      </select>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="active-filters" id="active-filters"></div>
  <div class="count-bar" id="count-bar"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- CANAIS -->
<div class="container">
  <div class="section-label">Canais para acompanhar</div>
  <div class="section-meta" id="channels-count-bar"></div>
  <div class="channels-grid" id="canais-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="title" id="modal-title"></div>
        <div class="author" id="modal-author"></div>
      </div>
      <button class="close-btn" id="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modal-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="modal-info">
      <div class="modal-info-block">
        <div class="modal-info-label">Descrição</div>
        <div class="modal-info-text" id="modal-description"></div>
        <button class="modal-expand-btn hidden" id="modal-description-toggle" type="button">Ver mais</button>
      </div>
      <div class="modal-info-block">
        <div class="modal-info-label">Links da descrição</div>
        <div class="modal-links" id="modal-links"></div>
      </div>
    </div>
    <div class="modal-footer">
      <a id="modal-yt-link" href="#" target="_blank">↗ Abrir no YouTube</a>
      <div class="modal-footer-actions">
        <button class="watch-toggle-btn" id="modal-watch-toggle" type="button">Marcar como assistido</button>
      </div>
    </div>
  </div>
</div>

<script>
const catStyles = {
  "Agentes de IA":              { color: "#a78bfa", bg: "rgba(167,139,250,0.12)" },
  "Claude Code + Produtividade":{ color: "#34d399", bg: "rgba(52,211,153,0.12)" },
  "Edição de Vídeo com IA":     { color: "#fb923c", bg: "rgba(251,146,60,0.12)" },
  "Monetização com IA":         { color: "#86efac", bg: "rgba(134,239,172,0.12)" },
  "Ferramentas / Setup":        { color: "#60a5fa", bg: "rgba(96,165,250,0.12)" },
  "Automação / WhatsApp":       { color: "#f472b6", bg: "rgba(244,114,182,0.12)" },
};

let videos = [];
let canais = [];
let activeFilter = "Todos";
let searchVal = "";
let sortMode = "published_desc";
let watchFilter = "all";
let currentModalVideoId = null;
const watchedVideoIds = new Set();

const filtersEl  = document.getElementById("filters");
const activeFiltersEl = document.getElementById("active-filters");
const gridEl     = document.getElementById("grid");
const countBar   = document.getElementById("count-bar");
const totalCount = document.getElementById("total-count");
const searchEl   = document.getElementById("search");
const sortSelect = document.getElementById("sort-select");
const watchStatusSelect = document.getElementById("watch-status-select");
const overlay    = document.getElementById("modal-overlay");
const iframe     = document.getElementById("modal-iframe");
const modalTitle = document.getElementById("modal-title");
const modalAuthor= document.getElementById("modal-author");
const modalLink  = document.getElementById("modal-yt-link");
const modalDescription = document.getElementById("modal-description");
const modalDescriptionToggle = document.getElementById("modal-description-toggle");
const modalLinks = document.getElementById("modal-links");
const modalWatchToggle = document.getElementById("modal-watch-toggle");
const closeBtn   = document.getElementById("close-btn");
const canaisGrid = document.getElementById("canais-grid");
const channelsCountBar = document.getElementById("channels-count-bar");
let isDescriptionExpanded = false;

function loadWatchedVideos() {
  try {
    const raw = localStorage.getItem("watchedVideosIA");
    const parsed = JSON.parse(raw || "[]");
    if (Array.isArray(parsed)) {
      parsed.forEach(id => watchedVideoIds.add(id));
    }
  } catch {}
}

function persistWatchedVideos() {
  localStorage.setItem("watchedVideosIA", JSON.stringify([...watchedVideoIds]));
}

function isWatched(videoId) {
  return watchedVideoIds.has(videoId);
}

function toggleWatched(videoId, forceValue) {
  const shouldWatch = typeof forceValue === "boolean" ? forceValue : !isWatched(videoId);
  if (shouldWatch) watchedVideoIds.add(videoId);
  else watchedVideoIds.delete(videoId);
  persistWatchedVideos();
}

function updateModalWatchButton(videoId) {
  const watched = isWatched(videoId);
  modalWatchToggle.classList.toggle("watched", watched);
  modalWatchToggle.textContent = watched ? "Marcar como não assistido" : "Marcar como assistido";
}

function buildFilters() {
  filtersEl.innerHTML = "";
  const cats = ["Todos", ...Object.keys(catStyles)];
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (c === "Todos" ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => {
      activeFilter = c;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.textContent === c));
      render();
    };
    filtersEl.appendChild(btn);
  });
}

function normalizeText(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function matchesChannelSearch(channel, normalizedQuery) {
  if (!normalizedQuery) return true;

  const values = [
    channel.nome,
    channel.handle,
    channel.desc,
    channel.url
  ].map(normalizeText);

  return values.some(value => value.includes(normalizedQuery));
}

function getRelatedChannels(filteredVideos) {
  const normalizedQuery = normalizeText(searchVal);
  if (!normalizedQuery) return canais;

  const authors = filteredVideos.map(v => normalizeText(v.author));
  const related = [];
  const seenHandles = new Set();

  canais.forEach(c => {
    const channelName = normalizeText(c.nome);
    const channelHandle = normalizeText(c.handle);
    const matchesQuery = matchesChannelSearch(c, normalizedQuery);
    const matchesAuthor = authors.some(author =>
      author === channelName ||
      author.includes(channelName) ||
      channelName.includes(author) ||
      author.includes(channelHandle.replace("@", "")) ||
      channelHandle.includes(author)
    );

    if ((matchesQuery || matchesAuthor) && !seenHandles.has(c.handle)) {
      seenHandles.add(c.handle);
      related.push(c);
    }
  });

  return related;
}

function parseDateValue(value) {
  const normalized = normalizePublishedAt(value);
  const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(normalized);
  if (!match) return null;

  const year = Number(match[1]);
  const month = Number(match[2]);
  const day = Number(match[3]);

  if (!year || !month || !day) return null;

  return Date.UTC(year, month - 1, day);
}

function normalizePublishedAt(value) {
  const raw = String(value || "").trim();
  if (!raw) return "";

  const isoDateMatch = raw.match(/\d{4}-\d{2}-\d{2}/);
  if (isoDateMatch) return isoDateMatch[0];

  const parsedTime = Date.parse(raw);
  if (Number.isNaN(parsedTime)) return "";

  return new Date(parsedTime).toISOString().slice(0, 10);
}

function formatPublishedDate(value) {
  const time = parseDateValue(value);
  if (time === null) return "Data indisponível";
  return new Intl.DateTimeFormat("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  }).format(new Date(time));
}

function sortVideos(list) {
  const sorted = [...list];

  sorted.sort((a, b) => {
    if (sortMode === "added_desc") return b.__addedIndex - a.__addedIndex;
    if (sortMode === "added_asc") return a.__addedIndex - b.__addedIndex;

    const dateA = parseDateValue(a.publishedAt);
    const dateB = parseDateValue(b.publishedAt);

    if (dateA === null && dateB === null) return b.__addedIndex - a.__addedIndex;
    if (dateA === null) return 1;
    if (dateB === null) return -1;

    if (sortMode === "published_asc") {
      return dateA - dateB || b.__addedIndex - a.__addedIndex;
    }

    return dateB - dateA || b.__addedIndex - a.__addedIndex;
  });

  return sorted;
}

function render() {
  const q = normalizeText(searchVal);
  const filtered = videos.filter(v => {
    const matchCat    = activeFilter === "Todos" || v.cat === activeFilter;
    const matchSearch = !q || [v.title, v.author, v.cat].some(value => normalizeText(value).includes(q));
    const watched = isWatched(v.id);
    const matchWatch = watchFilter === "all" || (watchFilter === "watched" && watched) || (watchFilter === "unwatched" && !watched);
    return matchCat && matchSearch && matchWatch;
  });
  const sortedVideos = sortVideos(filtered);
  const relatedChannels = getRelatedChannels(sortedVideos);
  const watchedTotal = videos.filter(v => isWatched(v.id)).length;
  const unwatchedTotal = videos.length - watchedTotal;

  countBar.innerHTML = `Exibindo <b>${sortedVideos.length}</b> de ${videos.length} vídeos • Assistidos: <b>${watchedTotal}</b> • Não assistidos: <b>${unwatchedTotal}</b>`;
  renderActiveFilters();
  gridEl.innerHTML = "";
  renderCanais(relatedChannels);

  if (!sortedVideos.length) {
    gridEl.innerHTML = '<div class="empty">Nenhum vídeo encontrado.</div>';
    return;
  }

  sortedVideos.forEach(v => {
    const st = catStyles[v.cat] || { color: "#888", bg: "rgba(136,136,136,0.12)" };
    const watched = isWatched(v.id);
    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--cat-color", st.color);
    card.innerHTML = `
      <div class="card-thumb-wrap">
        <img class="card-thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay"><span>▶</span></div>
        ${watched ? '<div class="card-watched-badge">Assistido</div>' : ''}
      </div>
      <div class="card-top">
        <span class="cat-badge" style="background:${st.bg};color:${st.color}">${v.cat}</span>
      </div>
      <div class="card-title">${v.title}</div>
      <div class="card-meta-row">
        <div class="card-author">${v.author}</div>
        <div class="card-date">${formatPublishedDate(v.publishedAt)}</div>
      </div>
      <a class="card-link" href="https://youtube.com/watch?v=${v.id}" target="_blank" onclick="event.stopPropagation()">
        ↗ youtube.com/watch?v=${v.id}
      </a>
      <div class="card-actions">
        <button class="watch-toggle-btn ${watched ? "watched" : ""}" type="button" data-watch-toggle="${v.id}">
          ${watched ? "Assistido" : "Marcar assistido"}
        </button>
      </div>
    `;
    card.querySelector("[data-watch-toggle]").onclick = (event) => {
      event.stopPropagation();
      toggleWatched(v.id);
      if (currentModalVideoId === v.id) updateModalWatchButton(v.id);
      render();
    };
    card.onclick = () => openModal(v);
    gridEl.appendChild(card);
  });
}

function renderActiveFilters() {
  const chips = [];
  if (searchVal.trim()) chips.push(`Busca: ${searchVal.trim()}`);
  if (activeFilter !== "Todos") chips.push(`Categoria: ${activeFilter}`);
  if (watchFilter === "watched") chips.push("Status: Assistidos");
  if (watchFilter === "unwatched") chips.push("Status: Não assistidos");
  if (sortMode === "published_desc") chips.push("Ordem: Publicação mais novos");
  if (sortMode === "published_asc") chips.push("Ordem: Publicação mais antigos");
  if (sortMode === "added_desc") chips.push("Ordem: Inclusão mais recentes");
  if (sortMode === "added_asc") chips.push("Ordem: Inclusão mais antigos");

  if (!chips.length) {
    activeFiltersEl.innerHTML = "";
    return;
  }

  activeFiltersEl.innerHTML = chips
    .map(chip => `<span class="active-filter-chip">${chip}</span>`)
    .join("") + '<button class="clear-filters-btn" id="clear-filters-btn" type="button">Limpar filtros</button>';

  document.getElementById("clear-filters-btn").onclick = () => {
    activeFilter = "Todos";
    searchVal = "";
    watchFilter = "all";
    sortMode = "published_desc";
    searchEl.value = "";
    sortSelect.value = "published_desc";
    watchStatusSelect.value = "all";
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.textContent === "Todos"));
    render();
  };
}

function renderCanais(canais) {
  const hasSearch = !!searchVal.trim();
  const sortedChannels = [...canais].sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR", { sensitivity: "base" }));
  channelsCountBar.innerHTML = hasSearch
    ? `Canais relacionados: <b>${sortedChannels.length}</b>`
    : `Total de <b>${sortedChannels.length}</b> canais`;
  canaisGrid.innerHTML = "";

  if (!sortedChannels.length) {
    canaisGrid.innerHTML = '<div class="empty">Nenhum canal relacionado encontrado.</div>';
    return;
  }

  sortedChannels.forEach(c => {
    const a = document.createElement("a");
    a.className = "channel-card";
    a.href = c.url;
    a.target = "_blank";
    a.innerHTML = `
      <div class="channel-avatar" style="background:${c.corBg};color:${c.cor}">${c.iniciais}</div>
      <div class="channel-name">${c.nome}</div>
      <div class="channel-handle">${c.handle}</div>
      <div class="channel-desc">${c.desc}</div>
      <div class="channel-link-label">↗ youtube.com/${c.handle}</div>
    `;
    canaisGrid.appendChild(a);
  });
}

function extractLinks(text) {
  return [...new Set(((text || "").match(/https?:\/\/[^\s)]+/g) || []))];
}

function updateDescriptionState() {
  const description = modalDescription.textContent.trim();
  const shouldClamp = description && description !== "Não há descrição para este vídeo." && description.length > 420;

  modalDescription.classList.toggle("clamped", shouldClamp && !isDescriptionExpanded);
  modalDescriptionToggle.classList.toggle("hidden", !shouldClamp);
  modalDescriptionToggle.textContent = isDescriptionExpanded ? "Ver menos" : "Ver mais";
}

function openModal(v) {
  const links = Array.isArray(v.links) && v.links.length ? v.links : extractLinks(v.desc);
  isDescriptionExpanded = false;
  currentModalVideoId = v.id;
  modalTitle.textContent  = v.title;
  modalAuthor.textContent = v.author;
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1`;
  modalLink.href = `https://youtube.com/watch?v=${v.id}`;
  modalDescription.textContent = v.desc?.trim() || "Não há descrição para este vídeo.";
  modalLinks.innerHTML = "";
  updateDescriptionState();

  if (links.length) {
    links.forEach((url, index) => {
      const item = document.createElement("div");
      const label = document.createElement("div");
      const a = document.createElement("a");
      item.className = "modal-link-item";
      label.className = "modal-link-index";
      label.textContent = `Link ${index + 1}`;
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = `↗ ${url}`;
      item.appendChild(label);
      item.appendChild(a);
      modalLinks.appendChild(item);
    });
  } else {
    modalLinks.innerHTML = '<div class="modal-info-empty">Não há links complementares na descrição.</div>';
  }

  updateModalWatchButton(v.id);
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  overlay.classList.remove("open");
  iframe.src = "";
  document.body.style.overflow = "";
  currentModalVideoId = null;
}

modalDescriptionToggle.onclick = () => {
  isDescriptionExpanded = !isDescriptionExpanded;
  updateDescriptionState();
};
modalWatchToggle.onclick = () => {
  if (!currentModalVideoId) return;
  toggleWatched(currentModalVideoId);
  updateModalWatchButton(currentModalVideoId);
  render();
};
closeBtn.onclick = closeModal;
overlay.onclick  = (e) => { if (e.target === overlay) closeModal(); };
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
searchEl.addEventListener("input", (e) => { searchVal = e.target.value; render(); });
sortSelect.addEventListener("change", (e) => { sortMode = e.target.value; render(); });
watchStatusSelect.addEventListener("change", (e) => { watchFilter = e.target.value; render(); });

// Carrega dados do JSON externo
loadWatchedVideos();
fetch("dados.json", { cache: "no-store" })
  .then(r => r.json())
  .then(data => {
    videos = data.videos.map((video, index) => ({
      ...video,
      publishedAt: normalizePublishedAt(
        video.publishedAt ||
        video.published_at ||
        video.publishDate ||
        video.datePublished ||
        video.uploadDate
      ),
      __addedIndex: index
    }));
    canais = data.canais;
    totalCount.textContent = videos.length;
    buildFilters();
    render();
  })
  .catch(() => {
    gridEl.innerHTML = '<div class="empty">Erro ao carregar dados.json. Verifique se o arquivo está na mesma pasta.</div>';
  });
</script>
</body>
</html>
