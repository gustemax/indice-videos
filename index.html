<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice de Vídeos IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8ff5a;
    --accent2: #ff6b35;

    --cat-agentes: #a78bfa;
    --cat-agentes-bg: rgba(167,139,250,0.12);
    --cat-ccprod: #34d399;
    --cat-ccprod-bg: rgba(52,211,153,0.12);
    --cat-video: #fb923c;
    --cat-video-bg: rgba(251,146,60,0.12);
    --cat-monet: #86efac;
    --cat-monet-bg: rgba(134,239,172,0.12);
    --cat-tools: #60a5fa;
    --cat-tools-bg: rgba(96,165,250,0.12);
    --cat-whats: #f472b6;
    --cat-whats-bg: rgba(244,114,182,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 3rem 2.5rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(232,255,90,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }
  .header-meta {
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex; gap: 1.5rem; flex-wrap: wrap;
  }
  .header-meta b { color: var(--text); }

  /* LAYOUT */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 2.5rem;
  }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; font-weight: 500; }

  /* SEARCH */
  .search-wrap {
    margin-bottom: 2rem;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px 12px 40px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--surface2); }
  .card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--border2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover::after { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .cat-badge {
    padding: 3px 9px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .play-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 10px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .card:hover .play-icon {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,90,0.08);
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }
  .card-author {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    background: var(--surface2);
  }
  .card-thumb-wrap {
    position: relative;
    width: 100%;
  }
  .card-thumb-wrap .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.45);
    border-radius: 2px;
  }
  .card-thumb-wrap .play-overlay span {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(232,255,90,0.92);
    display: flex; align-items: center; justify-content: center;
    color: #0d0d0d;
    font-size: 14px;
    padding-left: 3px;
  }
  .card:hover .play-overlay { opacity: 1; }

  .card-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 0 0;
    border-top: 1px solid var(--border);
    transition: color 0.15s;
  }
  .card-link:hover { color: var(--accent); }

  /* MODAL PLAYER */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    width: min(860px, 95vw);
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  .modal-header .title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .modal-header .author { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .close-btn {
    background: none; border: 1px solid var(--border2);
    color: var(--muted); font-size: 16px;
    width: 32px; height: 32px;
    border-radius: 2px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .close-btn:hover { border-color: var(--text); color: var(--text); }
  .modal-body {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
  }
  .modal-body iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .modal-footer {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex; gap: 1rem; align-items: center;
  }
  .modal-footer a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .modal-footer a:hover { color: var(--accent); }

  /* CANAIS */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 3rem;
  }
  .channel-card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: background 0.15s;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }
  .channel-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .channel-card:hover { background: var(--surface2); }
  .channel-card:hover::after { opacity: 1; }
  .channel-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    margin-bottom: 0.25rem;
    flex-shrink: 0;
  }
  .channel-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .channel-handle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .channel-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 0.25rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .channel-link-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
    transition: color 0.15s;
  }
  .channel-card:hover .channel-link-label { color: var(--accent); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    padding: 3rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* COUNTER */
  .count-bar {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .count-bar b { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-label">Índice de conteúdo</div>
  <h1>Vídeos <span>IA</span></h1>
  <div class="header-meta">
    <span><b id="total-count">14</b> vídeos</span>
    <span><b>6</b> categorias</span>
    <span><b>Abr 2026</b></span>
  </div>
</header>

<div class="container">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Buscar por título, canal ou categoria...">
  </div>

  <div class="filters" id="filters"></div>
  <div class="count-bar" id="count-bar"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- CANAIS -->
<div class="container">
  <div class="section-label">Canais para acompanhar</div>
  <div class="channels-grid" id="canais-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="title" id="modal-title"></div>
        <div class="author" id="modal-author"></div>
      </div>
      <button class="close-btn" id="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modal-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="modal-footer">
      <a id="modal-yt-link" href="#" target="_blank">↗ Abrir no YouTube</a>
    </div>
  </div>
</div>

<script>
const catStyles = {
  "Agentes de IA":              { color: "#a78bfa", bg: "rgba(167,139,250,0.12)" },
  "Claude Code + Produtividade":{ color: "#34d399", bg: "rgba(52,211,153,0.12)" },
  "Edição de Vídeo com IA":     { color: "#fb923c", bg: "rgba(251,146,60,0.12)" },
  "Monetização com IA":         { color: "#86efac", bg: "rgba(134,239,172,0.12)" },
  "Ferramentas / Setup":        { color: "#60a5fa", bg: "rgba(96,165,250,0.12)" },
  "Automação / WhatsApp":       { color: "#f472b6", bg: "rgba(244,114,182,0.12)" },
};

let videos = [];
let activeFilter = "Todos";
let searchVal = "";

const filtersEl  = document.getElementById("filters");
const gridEl     = document.getElementById("grid");
const countBar   = document.getElementById("count-bar");
const totalCount = document.getElementById("total-count");
const searchEl   = document.getElementById("search");
const overlay    = document.getElementById("modal-overlay");
const iframe     = document.getElementById("modal-iframe");
const modalTitle = document.getElementById("modal-title");
const modalAuthor= document.getElementById("modal-author");
const modalLink  = document.getElementById("modal-yt-link");
const closeBtn   = document.getElementById("close-btn");
const canaisGrid = document.getElementById("canais-grid");

function buildFilters() {
  filtersEl.innerHTML = "";
  const cats = ["Todos", ...Object.keys(catStyles)];
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (c === "Todos" ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => {
      activeFilter = c;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.textContent === c));
      render();
    };
    filtersEl.appendChild(btn);
  });
}

function render() {
  const q = searchVal.toLowerCase();
  const filtered = videos.filter(v => {
    const matchCat    = activeFilter === "Todos" || v.cat === activeFilter;
    const matchSearch = !q || v.title.toLowerCase().includes(q) || v.author.toLowerCase().includes(q) || v.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  countBar.innerHTML = `Exibindo <b>${filtered.length}</b> de ${videos.length} vídeos`;
  gridEl.innerHTML = "";

  if (!filtered.length) {
    gridEl.innerHTML = '<div class="empty">Nenhum vídeo encontrado.</div>';
    return;
  }

  filtered.forEach(v => {
    const st = catStyles[v.cat] || { color: "#888", bg: "rgba(136,136,136,0.12)" };
    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--cat-color", st.color);
    card.innerHTML = `
      <div class="card-thumb-wrap">
        <img class="card-thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" loading="lazy">
        <div class="play-overlay"><span>▶</span></div>
      </div>
      <div class="card-top">
        <span class="cat-badge" style="background:${st.bg};color:${st.color}">${v.cat}</span>
      </div>
      <div class="card-title">${v.title}</div>
      <div class="card-author">${v.author}</div>
      <a class="card-link" href="https://youtube.com/watch?v=${v.id}" target="_blank" onclick="event.stopPropagation()">
        ↗ youtube.com/watch?v=${v.id}
      </a>
    `;
    card.onclick = () => openModal(v);
    gridEl.appendChild(card);
  });
}

function renderCanais(canais) {
  canaisGrid.innerHTML = "";
  canais.forEach(c => {
    const a = document.createElement("a");
    a.className = "channel-card";
    a.href = c.url;
    a.target = "_blank";
    a.innerHTML = `
      <div class="channel-avatar" style="background:${c.corBg};color:${c.cor}">${c.iniciais}</div>
      <div class="channel-name">${c.nome}</div>
      <div class="channel-handle">${c.handle}</div>
      <div class="channel-desc">${c.desc}</div>
      <div class="channel-link-label">↗ youtube.com/${c.handle}</div>
    `;
    canaisGrid.appendChild(a);
  });
}

function openModal(v) {
  modalTitle.textContent  = v.title;
  modalAuthor.textContent = v.author;
  iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1`;
  modalLink.href = `https://youtube.com/watch?v=${v.id}`;
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  overlay.classList.remove("open");
  iframe.src = "";
  document.body.style.overflow = "";
}

closeBtn.onclick = closeModal;
overlay.onclick  = (e) => { if (e.target === overlay) closeModal(); };
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
searchEl.addEventListener("input", (e) => { searchVal = e.target.value; render(); });

// Carrega dados do JSON externo
fetch("dados.json")
  .then(r => r.json())
  .then(data => {
    videos = data.videos;
    totalCount.textContent = videos.length;
    buildFilters();
    render();
    renderCanais(data.canais);
  })
  .catch(() => {
    gridEl.innerHTML = '<div class="empty">Erro ao carregar dados.json. Verifique se o arquivo está na mesma pasta.</div>';
  });
</script>
</body>
</html>
